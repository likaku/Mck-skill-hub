<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <defs>
    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 48px; font-weight: bold; fill: #051C2C; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #666666; letter-spacing: 2.5px; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Geometric icon: 2x2 matrix squares — navy monochrome -->
  <g transform="translate(0, 18)">
    <rect x="0" y="0" width="32" height="32" rx="4" fill="#051C2C"/>
    <rect x="36" y="0" width="32" height="32" rx="4" fill="#051C2C" opacity="0.6"/>
    <rect x="0" y="36" width="32" height="32" rx="4" fill="#051C2C" opacity="0.3"/>
    <rect x="36" y="36" width="32" height="32" rx="4" fill="#051C2C" opacity="0.15"/>
  </g>

  <!-- Title text — all navy -->
  <text x="88" y="58" class="title">Mck Skill Hub</text>

  <!-- Accent line — navy, not gold -->
  <rect x="88" y="68" width="120" height="2.5" rx="1.25" fill="#051C2C"/>

  <!-- Subtitle — MED_GRAY -->
  <text x="88" y="95" class="subtitle">Professional AI skills for knowledge workers</text>
</svg>
